name: LayoutShowcaseApp

options:
  minimumXcodeGenVersion: 2.40.0
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

packages:
  LayoutExamplesFeature:
    path: Packages/LayoutExamplesFeature

targets:
  LayoutShowcaseApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: LayoutShowcaseApp/App
    resources:
      - path: LayoutShowcaseApp/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.LayoutShowcaseApp
        PRODUCT_NAME: LayoutShowcaseApp
        SWIFT_VERSION: 5.10
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: LayoutShowcaseApp
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: LayoutExamplesFeature

  LayoutShowcaseAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/LayoutShowcaseAppUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.LayoutShowcaseApp.UITests
        SWIFT_VERSION: 5.10
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LayoutShowcaseApp

schemes:
  LayoutShowcaseApp:
    build:
      targets:
        LayoutShowcaseApp: all
    test:
      config: Debug
      targets:
        - name: LayoutShowcaseAppUITests
          randomExecutionOrder: false
    run:
      config: Debug
    archive:
      config: Release
